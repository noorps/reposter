<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 320px;
        padding: 16px;
        font-family: Arial, sans-serif;
        background: #f9fafb;
        color: #111;
      }

      h1 {
        font-size: 18px;
        color: #2563eb;
        margin-bottom: 14px;
      }

      .section-label {
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        color: #6b7280;
        margin-bottom: 8px;
        letter-spacing: 0.05em;
      }

      .group-list {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 16px;
      }

      .group-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid #f3f4f6;
        cursor: pointer;
      }

      .group-item:last-child { border-bottom: none; }

      .group-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #2563eb;
        cursor: pointer;
        flex-shrink: 0;
      }

      .group-item label {
        font-size: 13px;
        cursor: pointer;
        line-height: 1.3;
      }

      .reminder-box {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 16px;
      }

      .reminder-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      select {
        flex: 1;
        padding: 7px 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        background: white;
        color: #111;
        cursor: pointer;
      }

      .btn-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .save-btn {
        flex: 1;
        padding: 7px;
        background: #f3f4f6;
        color: #374151;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }

      .save-btn:hover { background: #e5e7eb; }

      .saved-msg {
        font-size: 12px;
        color: #16a34a;
        text-align: center;
        margin-top: 6px;
        min-height: 16px;
      }

      .post-btn {
        width: 100%;
        padding: 11px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
      }

      .post-btn:hover { background: #1d4ed8; }
      .post-btn:disabled { background: #93c5fd; cursor: not-allowed; }

      .status {
        font-size: 12px;
        color: #6b7280;
        text-align: center;
        margin-top: 8px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Reposter 🔁</h1>

    <div class="section-label">Your Groups</div>
    <div class="group-list">
      <div class="group-item">
        <input type="checkbox" id="g1" checked />
        <label for="g1">Indians in Dallas/Fort Worth</label>
      </div>
      <div class="group-item">
        <input type="checkbox" id="g2" checked />
        <label for="g2">Punjabis in Dallas</label>
      </div>
      <div class="group-item">
        <input type="checkbox" id="g3" checked />
        <label for="g3">Frisco Desis</label>
      </div>
      <div class="group-item">
        <input type="checkbox" id="g4" checked />
        <label for="g4">Desis in Frisco, Celina, Plano...</label>
      </div>
      <div class="group-item">
        <input type="checkbox" id="g5" checked />
        <label for="g5">Allen Plano McKinney Desis</label>
      </div>
    </div>

    <div class="section-label">Weekly Reminder</div>
    <div class="reminder-box">
      <div class="reminder-row">
        <select id="reminderDay">
          <option value="0">Sunday</option>
          <option value="1" selected>Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
          <option value="6">Saturday</option>
        </select>
        <select id="reminderTime">
          <option value="6">6:00 AM</option>
          <option value="7">7:00 AM</option>
          <option value="8">8:00 AM</option>
          <option value="9" selected>9:00 AM</option>
          <option value="10">10:00 AM</option>
          <option value="11">11:00 AM</option>
          <option value="12">12:00 PM</option>
          <option value="13">1:00 PM</option>
          <option value="14">2:00 PM</option>
          <option value="15">3:00 PM</option>
          <option value="16">4:00 PM</option>
          <option value="17">5:00 PM</option>
          <option value="18">6:00 PM</option>
          <option value="19">7:00 PM</option>
          <option value="20">8:00 PM</option>
          <option value="21">9:00 PM</option>
          <option value="22">10:00 PM</option>
          <option value="23">11:00 PM</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="save-btn" id="saveReminder">Save Reminder</button>
        <button class="save-btn" id="testReminder">Test Now</button>
      </div>
      <div class="saved-msg" id="savedMsg"></div>
    </div>

    <button class="post-btn" id="postBtn">Post to Selected Groups</button>
    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
